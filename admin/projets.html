<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Projets - Afrinova Admin</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%230A0A0A'/><text x='32' y='44' font-family='Arial' font-size='40' font-weight='bold' fill='%23D4AF37' text-anchor='middle'>A</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8860B;
            --blue: #1E90FF;
            --black: #0A0A0A;
            --black-light: #111111;
            --black-card: #161616;
            --white: #FFFFFF;
            --gray: #BBBBBB;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .admin-header h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--gold);
            font-size: 1.8rem;
        }
        
        .btn {
            padding: 0.65rem 1.2rem;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.3s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-retour {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold);
        }
        
        .btn-retour:hover {
            background: rgba(212, 175, 55, 0.2);
        }
        
        .btn-ajouter {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            font-weight: 700;
        }
        
        .btn-ajouter:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }
        
        .btn-supprimer {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #FF4444;
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-supprimer:hover {
            background: rgba(255, 68, 68, 0.2);
        }
        
        .btn-modifier {
            background: rgba(30, 144, 255, 0.1);
            border: 1px solid rgba(30, 144, 255, 0.3);
            color: var(--blue);
            flex: 1;
            padding: 0.4rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }
        
        .btn-modifier:hover {
            background: rgba(30, 144, 255, 0.2);
        }
        
        .form-container {
            background: var(--black-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: none;
        }
        
        .form-container.active {
            display: block;
        }
        
        .form-container h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--gold);
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            color: var(--gray);
            font-size: 0.8rem;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--black-light);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }
        
        .form-group select {
            cursor: pointer;
        }
        
        .image-upload-area {
            background: var(--black-light);
            border: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .image-upload-area:hover {
            border-color: var(--gold);
        }
        
        .image-upload-area .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .image-upload-area p {
            color: var(--gray);
            font-size: 0.8rem;
        }
        
        .image-upload-area input[type="file"] {
            display: none;
        }
        
        .image-preview {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 10px;
            margin-top: 1rem;
            display: none;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .image-preview.active {
            display: block;
        }
        
        .projets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        
        .projet-card {
            background: var(--black-card);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .projet-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }
        
        .projet-image {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .projet-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .projet-info {
            padding: 1.25rem;
        }
        
        .projet-info h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--gold);
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }
        
        .projet-info p {
            color: var(--gray);
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        
        .projet-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 0.75rem;
        }
        
        .projet-tag {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--gold);
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.65rem;
        }
        
        .projet-actions {
            display: flex;
            gap: 0.4rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
            grid-column: 1 / -1;
        }
        
        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .projets-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    
    <div class="admin-container">
        
        <div class="admin-header">
            <h1>📂 Gestion des Projets</h1>
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                <a href="index.html" class="btn btn-retour">← Dashboard</a>
                <a href="../index.html" target="_blank" class="btn btn-retour">🌐 Site</a>
                <button class="btn btn-ajouter" id="btnAjouter">+ Ajouter</button>
            </div>
        </div>
        
        <!-- Formulaire -->
        <div class="form-container" id="formContainer">
            <h2 id="formTitle">➕ Ajouter un nouveau projet</h2>
            
            <form id="projetForm">
                <input type="hidden" id="projetIndex" value="-1">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="projetNom">Nom du projet *</label>
                        <input type="text" id="projetNom" required placeholder="Ex: Site E-commerce">
                    </div>
                    <div class="form-group">
                        <label for="projetCategorie">Catégorie *</label>
                        <select id="projetCategorie" required>
                            <option value="">Choisir...</option>
                            <option value="web">Sites Web</option>
                            <option value="app">Apps Mobiles</option>
                            <option value="software">Logiciels</option>
                            <option value="design">Design</option>
                            <option value="ecommerce">E-commerce</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="projetDescription">Description</label>
                    <textarea id="projetDescription" placeholder="Décrivez le projet..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="projetTechnologies">Technologies (séparées par des virgules)</label>
                    <input type="text" id="projetTechnologies" placeholder="Ex: HTML, CSS, JavaScript">
                </div>
                
                <div class="form-group">
                    <label for="projetLien">Lien du projet</label>
                    <input type="url" id="projetLien" placeholder="https://...">
                </div>
                
                <div class="form-group">
                    <label>Image du projet</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <div class="upload-icon">🖼️</div>
                        <p>Cliquez pour choisir une image</p>
                        <p style="font-size: 0.7rem; opacity: 0.7;">JPG, PNG, GIF - Max 5MB</p>
                        <input type="file" id="projetImage" accept="image/*">
                    </div>
                    <img id="imagePreview" class="image-preview" src="" alt="Aperçu">
                </div>
                
                <div style="display: flex; gap: 0.75rem;">
                    <button type="submit" class="btn btn-ajouter" style="flex: 1;">💾 Enregistrer</button>
                    <button type="button" class="btn btn-retour" id="btnAnnuler" style="flex: 1;">❌ Annuler</button>
                </div>
            </form>
        </div>
        
        <!-- Grille projets -->
        <div class="projets-grid" id="projetsGrid">
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <p>Aucun projet pour le moment</p>
                <p style="font-size: 0.8rem; margin-top: 0.5rem;">Cliquez sur "+ Ajouter"</p>
            </div>
        </div>
        
    </div>
    
    <script>
        // Vérifier connexion
        if (localStorage.getItem('afrinova_admin_logged') !== 'true') {
            window.location.href = 'index.html';
        }
        
        var projets = JSON.parse(localStorage.getItem('afrinova_projets') || '[]');
        var formContainer = document.getElementById('formContainer');
        var projetForm = document.getElementById('projetForm');
        var currentImageData = '';
        
        function afficherProjets() {
            var grid = document.getElementById('projetsGrid');
            
            if (projets.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Aucun projet pour le moment</p><p style="font-size: 0.8rem; margin-top: 0.5rem;">Cliquez sur "+ Ajouter"</p></div>';
                return;
            }
            
            var couleurs = {
                web: 'linear-gradient(135deg, #1a1a2e, #16213e)',
                app: 'linear-gradient(135deg, #0f0f23, #1a1a3e)',
                software: 'linear-gradient(135deg, #1a1a1a, #2d2d2d)',
                design: 'linear-gradient(135deg, #1a1025, #2d1a3e)',
                ecommerce: 'linear-gradient(135deg, #0a1a1a, #1a2d2d)'
            };
            
            var emojis = {
                web: '🌐', app: '📱', software: '💻', design: '🎨', ecommerce: '🛒'
            };
            
            var html = '';
            projets.forEach(function(projet, index) {
                var tagsHTML = '';
                if (projet.technologies) {
                    projet.technologies.split(',').forEach(function(t) {
                        tagsHTML += '<span class="projet-tag">' + escapeHTML(t.trim()) + '</span>';
                    });
                }
                
                var imageHTML = '';
                if (projet.image) {
                    imageHTML = '<img src="' + projet.image + '" alt="' + escapeHTML(projet.nom) + '">';
                } else {
                    imageHTML = '<span style="font-size: 3rem;">' + (emojis[projet.categorie] || '📂') + '</span>';
                }
                
                var couleur = couleurs[projet.categorie] || 'linear-gradient(135deg, #1a1a2e, #16213e)';
                
                html += '<div class="projet-card">';
                html += '<div class="projet-image" style="background: ' + couleur + ';">' + imageHTML + '</div>';
                html += '<div class="projet-info">';
                html += '<h3>' + escapeHTML(projet.nom) + '</h3>';
                html += '<p>' + escapeHTML(projet.description || 'Aucune description') + '</p>';
                html += '<div class="projet-tags">' + tagsHTML + '</div>';
                html += '<div style="color: var(--gray); font-size: 0.7rem; margin-bottom: 0.5rem;">📁 Catégorie: ' + escapeHTML(projet.categorie) + '</div>';
                html += '<div class="projet-actions">';
                html += '<button class="btn-modifier" onclick="modifierProjet(' + index + ')">✏️ Modifier</button>';
                html += '<button class="btn-supprimer" onclick="supprimerProjet(' + index + ')">🗑️</button>';
                html += '</div>';
                html += '</div></div>';
            });
            
            grid.innerHTML = html;
        }
        
        projetForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            var index = parseInt(document.getElementById('projetIndex').value);
            
            var projet = {
                nom: document.getElementById('projetNom').value.trim(),
                categorie: document.getElementById('projetCategorie').value,
                description: document.getElementById('projetDescription').value.trim(),
                technologies: document.getElementById('projetTechnologies').value.trim(),
                lien: document.getElementById('projetLien').value.trim(),
                image: currentImageData
            };
            
            if (index >= 0) {
                projets[index] = projet;
            } else {
                projets.push(projet);
            }
            
            localStorage.setItem('afrinova_projets', JSON.stringify(projets));
            
            // Reset
            projetForm.reset();
            document.getElementById('projetIndex').value = '-1';
            currentImageData = '';
            document.getElementById('imagePreview').classList.remove('active');
            formContainer.classList.remove('active');
            document.getElementById('formTitle').textContent = '➕ Ajouter un nouveau projet';
            document.getElementById('btnAjouter').style.display = '';
            
            afficherProjets();
            alert('✅ Projet enregistré !');
        });
        
        window.modifierProjet = function(index) {
            var projet = projets[index];
            
            document.getElementById('projetIndex').value = index;
            document.getElementById('projetNom').value = projet.nom;
            document.getElementById('projetCategorie').value = projet.categorie;
            document.getElementById('projetDescription').value = projet.description || '';
            document.getElementById('projetTechnologies').value = projet.technologies || '';
            document.getElementById('projetLien').value = projet.lien || '';
            
            currentImageData = projet.image || '';
            if (currentImageData) {
                document.getElementById('imagePreview').src = currentImageData;
                document.getElementById('imagePreview').classList.add('active');
            } else {
                document.getElementById('imagePreview').classList.remove('active');
            }
            
            document.getElementById('formTitle').textContent = '✏️ Modifier le projet';
            formContainer.classList.add('active');
            document.getElementById('btnAjouter').style.display = 'none';
            window.scrollTo({ top: formContainer.offsetTop - 50, behavior: 'smooth' });
        };
        
        window.supprimerProjet = function(index) {
            if (confirm('Supprimer ce projet ?')) {
                projets.splice(index, 1);
                localStorage.setItem('afrinova_projets', JSON.stringify(projets));
                afficherProjets();
            }
        };
        
        document.getElementById('btnAjouter').addEventListener('click', function() {
            projetForm.reset();
            document.getElementById('projetIndex').value = '-1';
            currentImageData = '';
            document.getElementById('imagePreview').classList.remove('active');
            document.getElementById('formTitle').textContent = '➕ Ajouter un nouveau projet';
            formContainer.classList.add('active');
            document.getElementById('btnAjouter').style.display = 'none';
            window.scrollTo({ top: formContainer.offsetTop - 50, behavior: 'smooth' });
        });
        
        document.getElementById('btnAnnuler').addEventListener('click', function() {
            formContainer.classList.remove('active');
            document.getElementById('btnAjouter').style.display = '';
            projetForm.reset();
            currentImageData = '';
            document.getElementById('imagePreview').classList.remove('active');
        });
        
        document.getElementById('imageUploadArea').addEventListener('click', function() {
            document.getElementById('projetImage').click();
        });
        
        document.getElementById('projetImage').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('❌ Image trop grande ! Max 5MB.');
                    return;
                }
                
                var reader = new FileReader();
                reader.onload = function(event) {
                    currentImageData = event.target.result;
                    document.getElementById('imagePreview').src = currentImageData;
                    document.getElementById('imagePreview').classList.add('active');
                };
                reader.readAsDataURL(file);
            }
        });
        
        function escapeHTML(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        afficherProjets();
    </script>
</body>
</html>
