<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Blog - Afrinova Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0A0A0A;color:#fff;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid rgba(212,175,55,0.2);flex-wrap:wrap;gap:15px}
        .header h1{font-family:'Orbitron',sans-serif;color:#D4AF37;font-size:28px}
        .btn{padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;text-decoration:none;border:none;font-size:14px;display:inline-flex;align-items:center;gap:8px}
        .btn-retour{background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3);color:#D4AF37}
        .btn-publier{background:#D4AF37;color:#000;font-weight:700}
        .btn-danger{background:rgba(255,68,68,0.1);border:1px solid #FF4444;color:#FF4444}
        .btn-modifier{background:rgba(30,144,255,0.1);border:1px solid #1E90FF;color:#1E90FF}
        .form-box{background:#161616;border:1px solid rgba(212,175,55,0.2);border-radius:16px;padding:30px;margin-bottom:20px;display:none}
        .form-box.active{display:block}
        .form-box h2{color:#D4AF37;margin-bottom:20px;font-family:'Orbitron',sans-serif}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;color:#888;margin-bottom:8px;font-size:14px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 15px;background:#111;border:1px solid rgba(212,175,55,0.2);border-radius:10px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;outline:none}
        .form-group textarea{min-height:200px;resize:vertical}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#D4AF37}
        .articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        .article-card{background:#161616;border:1px solid rgba(212,175,55,0.15);border-radius:16px;overflow:hidden}
        .article-card-body{padding:20px}
        .article-card-body h3{color:#D4AF37;margin-bottom:10px;font-size:16px}
        .article-card-body p{color:#888;font-size:13px;margin-bottom:10px;line-height:1.5}
        .article-card-body .date{color:#666;font-size:11px;margin-bottom:10px}
        .article-actions{display:flex;gap:8px}
        .article-actions button{flex:1;padding:8px;border-radius:8px;font-size:12px;cursor:pointer;border:none;font-weight:600}
        .empty{text-align:center;padding:40px;color:#888;grid-column:1/-1}
        .image-upload{border:2px dashed rgba(212,175,55,0.3);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px}
        .image-upload:hover{border-color:#D4AF37}
        .image-upload input{display:none}
        .image-preview{max-width:100%;max-height:200px;border-radius:10px;margin-top:10px;display:none}
        .image-preview.active{display:block}
    </style>
</head>
<body>

<div class="container">

<div class="header">
    <h1>📝 Gestion du Blog</h1>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="index.html" class="btn btn-retour">← Dashboard</a>
        <a href="../blog/index.html" target="_blank" class="btn btn-retour">🌐 Voir blog</a>
        <button class="btn btn-publier" id="btnNouveau">+ Nouvel article</button>
    </div>
</div>

<!-- Formulaire -->
<div class="form-box" id="formBox">
    <h2 id="formTitle">➕ Nouvel article</h2>
    <form id="articleForm">
        <input type="hidden" id="articleIndex" value="-1">
        <div class="form-group">
            <label>Titre de l'article *</label>
            <input type="text" id="articleTitre" required placeholder="Titre accrocheur...">
        </div>
        <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
            <div>
                <label>Catégorie</label>
                <select id="articleCategorie">
                    <option value="">Choisir...</option>
                    <option value="Web">Web</option>
                    <option value="Mobile">Mobile</option>
                    <option value="Design">Design</option>
                    <option value="Sécurité">Sécurité</option>
                    <option value="IA">IA</option>
                    <option value="Business">Business</option>
                </select>
            </div>
            <div>
                <label>Émoji</label>
                <select id="articleEmoji">
                    <option value="💻">💻 Web</option>
                    <option value="📱">📱 Mobile</option>
                    <option value="🎨">🎨 Design</option>
                    <option value="🔒">🔒 Sécurité</option>
                    <option value="🤖">🤖 IA</option>
                    <option value="📊">📊 Business</option>
                    <option value="🚀">🚀 Tech</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Image (optionnel)</label>
            <div class="image-upload" id="imageUpload">
                <p>🖼️ Cliquez pour ajouter une image</p>
                <p style="font-size:12px;color:#666">JPG, PNG - Max 5MB</p>
                <input type="file" id="articleImage" accept="image/*">
            </div>
            <img id="imagePreview" class="image-preview" src="" alt="Aperçu">
        </div>
        <div class="form-group">
            <label>Contenu de l'article *</label>
            <textarea id="articleContenu" required placeholder="Écrivez votre article ici..."></textarea>
        </div>
        <div style="display:flex;gap:10px">
            <button type="submit" class="btn btn-publier" style="flex:1">💾 Enregistrer</button>
            <button type="button" class="btn btn-retour" id="btnAnnuler" style="flex:1">❌ Annuler</button>
        </div>
    </form>
</div>

<!-- Liste articles -->
<div class="articles-grid" id="articlesGrid">
    <div class="empty">📭 Aucun article</div>
</div>

</div>

<script>
if (localStorage.getItem('admin_logged') !== 'yes') { window.location.href = 'index.html'; }

var articles = JSON.parse(localStorage.getItem('afrinova_articles') || '[]');
var currentImageData = '';

function afficherArticles() {
    var grid = document.getElementById('articlesGrid');
    if (articles.length === 0) {
        grid.innerHTML = '<div class="empty">📭 Aucun article. Cliquez sur "+ Nouvel article"</div>';
        return;
    }
    var html = '';
    articles.forEach(function(a, i) {
        var date = new Date(a.date);
        var dateStr = date.getDate()+'/'+(date.getMonth()+1)+'/'+date.getFullYear();
        html += '<div class="article-card">';
        html += '<div class="article-card-body">';
        html += '<h3>' + a.titre + '</h3>';
        html += '<p>' + (a.contenu||'').substring(0,100) + '...</p>';
        html += '<div class="date">📅 ' + dateStr + ' | 📁 ' + (a.categorie||'Sans catégorie') + '</div>';
        html += '<div class="article-actions">';
        html += '<button class="btn-modifier" onclick="modifierArticle('+i+')">✏️ Modifier</button>';
        html += '<button class="btn-danger" onclick="supprimerArticle('+i+')">🗑️ Supprimer</button>';
        html += '</div></div></div>';
    });
    grid.innerHTML = html;
}

document.getElementById('btnNouveau').addEventListener('click', function() {
    document.getElementById('articleForm').reset();
    document.getElementById('articleIndex').value = '-1';
    currentImageData = '';
    document.getElementById('imagePreview').classList.remove('active');
    document.getElementById('formTitle').textContent = '➕ Nouvel article';
    document.getElementById('formBox').classList.add('active');
    document.getElementById('btnNouveau').style.display = 'none';
    window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('btnAnnuler').addEventListener('click', function() {
    document.getElementById('formBox').classList.remove('active');
    document.getElementById('btnNouveau').style.display = '';
});

document.getElementById('articleForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var index = parseInt(document.getElementById('articleIndex').value);
    var article = {
        titre: document.getElementById('articleTitre').value.trim(),
        categorie: document.getElementById('articleCategorie').value,
        emoji: document.getElementById('articleEmoji').value,
        contenu: document.getElementById('articleContenu').value.trim(),
        image: currentImageData,
        date: new Date().toISOString()
    };
    if (index >= 0) { articles[index] = article; }
    else { articles.push(article); }
    localStorage.setItem('afrinova_articles', JSON.stringify(articles));
    document.getElementById('formBox').classList.remove('active');
    document.getElementById('btnNouveau').style.display = '';
    afficherArticles();
    alert('✅ Article enregistré !');
});

function modifierArticle(index) {
    var a = articles[index];
    document.getElementById('articleIndex').value = index;
    document.getElementById('articleTitre').value = a.titre;
    document.getElementById('articleCategorie').value = a.categorie || '';
    document.getElementById('articleEmoji').value = a.emoji || '💻';
    document.getElementById('articleContenu').value = a.contenu;
    currentImageData = a.image || '';
    if (currentImageData) {
        document.getElementById('imagePreview').src = currentImageData;
        document.getElementById('imagePreview').classList.add('active');
    }
    document.getElementById('formTitle').textContent = '✏️ Modifier article';
    document.getElementById('formBox').classList.add('active');
    document.getElementById('btnNouveau').style.display = 'none';
    window.scrollTo({top:0,behavior:'smooth'});
}

function supprimerArticle(index) {
    if (confirm('Supprimer cet article ?')) {
        articles.splice(index, 1);
        localStorage.setItem('afrinova_articles', JSON.stringify(articles));
        afficherArticles();
    }
}

document.getElementById('imageUpload').addEventListener('click', function() {
    document.getElementById('articleImage').click();
});

document.getElementById('articleImage').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (file) {
        if (file.size > 5*1024*1024) { alert('Image trop grande ! Max 5MB'); return; }
        var reader = new FileReader();
        reader.onload = function(ev) {
            currentImageData = ev.target.result;
            document.getElementById('imagePreview').src = currentImageData;
            document.getElementById('imagePreview').classList.add('active');
        };
        reader.readAsDataURL(file);
    }
});

afficherArticles();
</script>
</body>
</html>
