<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de visite - Afrinova Tech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#555;
    font-family:'Inter','Segoe UI',Arial,sans-serif;
}

/* CARTE FORMAT STANDARD 85mm x 55mm */
.carte{
    width:510px;
    height:330px;
    background:#fff;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    position:relative;
    /* CONTOUR BIEN VISIBLE */
    border:2px solid #D4AF37;
    outline:1px solid #ccc;
}

/* BANDEAU OR EN HAUT */
.bandeau-top{
    position:absolute;
    top:0;left:0;right:0;
    height:5px;
    background:linear-gradient(90deg,#D4AF37,#1E90FF,#D4AF37);
    z-index:10;
}

/* CONTENU PRINCIPAL */
.corps{
    display:flex;
    height:100%;
    padding-top:5px;
}

/* COLONNE GAUCHE - LOGO ET COULEUR */
.gauche{
    width:180px;
    background:linear-gradient(180deg,#0A0A0A,#111);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:25px 20px;
    border-right:2px solid rgba(212,175,55,0.3);
}

.gauche .logo{
    width:95px;
    height:95px;
    margin-bottom:12px;
}

.gauche .logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:12px;
}

.gauche .nom-societe{
    color:#D4AF37;
    font-size:16px;
    font-weight:900;
    text-align:center;
    letter-spacing:2px;
    line-height:1.2;
}

.gauche .nom-societe span{
    display:block;
    font-size:7px;
    color:#1E90FF;
    letter-spacing:4px;
    font-weight:400;
}

.gauche .slogan{
    color:#aaa;
    font-size:7px;
    text-align:center;
    margin-top:10px;
    font-style:italic;
    line-height:1.3;
}

.gauche .site{
    color:#D4AF37;
    font-size:8px;
    text-align:center;
    margin-top:12px;
    font-weight:700;
    letter-spacing:1px;
}

.gauche .site span{
    color:#1E90FF;
}

/* COLONNE DROITE - INFOS */
.droite{
    flex:1;
    padding:25px 22px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.droite .nom-personne{
    color:#0A0A0A;
    font-size:16px;
    font-weight:700;
    margin-bottom:3px;
}

.droite .poste{
    color:#D4AF37;
    font-size:10px;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:18px;
}

.droite .separateur{
    width:50px;
    height:2px;
    background:#D4AF37;
    margin-bottom:18px;
}

.droite .info{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    font-size:10px;
    color:#333;
}

.droite .info .icon{
    width:26px;
    height:26px;
    background:#f8f8f8;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    flex-shrink:0;
    border:1px solid #e0e0e0;
}

.droite .info a{
    color:#1E90FF;
    text-decoration:none;
    font-weight:600;
}

.droite .info a:hover{
    text-decoration:underline;
}

/* BANDEAU SERVICES EN BAS */
.services{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:#fafafa;
    border-top:1px solid #e0e0e0;
    padding:7px 20px;
    display:flex;
    justify-content:center;
    gap:18px;
    font-size:8px;
    color:#666;
    letter-spacing:0.5px;
}

.services span{
    color:#333;
    font-weight:600;
}

.services span::before{
    content:'●';
    color:#D4AF37;
    margin-right:4px;
    font-size:5px;
}

/* IMPRESSION */
@media print{
    body{background:#fff;margin:0;padding:0}
    .carte{box-shadow:none}
    @page{size:85mm 55mm;margin:0}
}

@media(max-width:550px){
    .carte{width:100%;height:auto;min-height:300px}
    .corps{flex-direction:column}
    .gauche{width:100%;flex-direction:row;gap:15px;padding:15px;border-right:none;border-bottom:2px solid rgba(212,175,55,0.3)}
    .gauche .logo{width:55px;height:55px;margin-bottom:0}
    .gauche .nom-societe{font-size:14px}
    .gauche .slogan{display:none}
    .gauche .site{margin-top:5px}
    .droite{padding:18px}
    .services{bottom:auto;position:relative}
}
</style>
</head>
<body>

<div class="carte">

    <!-- COLONNE GAUCHE -->
    <div class="gauche">
        <div class="logo">
            <img src="logo.png" alt="Afrinova Tech">
        </div>
        <div class="nom-societe">

            L'Afrique innove,<br>le monde avance
        </div>
        <div class="site">
            🌐 <span>afrinova.tech</span>
        </div>
    </div>

    <!-- COLONNE DROITE -->
    <div class="droite">
        <div class="nom-personne">Abdelkader Hassan SADAK</div>
        <div class="poste">PDG & Fondateur</div>
        <div class="separateur"></div>
        
        <div class="info">
            <div class="icon">📧</div>
            <a href="mailto:afrinovatech46@gmail.com">afrinovatech46@gmail.com</a>
        </div>
        
        <div class="info">
            <div class="icon">📱</div>
            <a href="tel:+22789434626">+227 89 43 46 26</a>
        </div>
        
        <div class="info">
            <div class="icon">💬</div>
            <a href="https://wa.me/22789434626">WhatsApp</a>
        </div>
        
        <div class="info">
            <div class="icon">📍</div>
            <div>Agadez, Niger</div>
        </div>
    </div>

    <!-- SERVICES -->
    <div class="services">
        <span>Création Sites Web</span>
        <span>Applications Mobiles</span>
        <span>Logiciels</span>
        <span>Identité Visuelle</span>
    </div>

</div>

</body>
</html>
