<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Afrinova Tech</title>
    <meta name="description" content="Actualités, tutoriels et innovations tech en Afrique par Afrinova Tech.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/mobile.css">
    <style>
        .blog-layout {
            display: flex;
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 20px;
            gap: 30px;
        }
        .blog-main {
            flex: 2;
            min-width: 0;
        }
        .blog-sidebar {
            flex: 1;
            background: #161616;
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 16px;
            padding: 25px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .blog-hero {
            text-align: center;
            padding: 40px 20px;
        }
        .blog-hero h1 {
            font-family: 'Orbitron', sans-serif;
            color: #D4AF37;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .blog-hero p {
            color: #888;
            font-size: 16px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            background: #111;
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .search-box input:focus {
            border-color: #D4AF37;
        }
        .search-box button {
            padding: 12px 24px;
            background: #D4AF37;
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-box button:hover {
            background: #fff;
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .category-btn {
            padding: 8px 18px;
            background: #111;
            border: 1px solid rgba(212,175,55,0.3);
            color: #ccc;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .category-btn:hover, .category-btn.active {
            background: #D4AF37;
            color: #000;
            border-color: #D4AF37;
            font-weight: bold;
        }
        .article-card {
            background: #161616;
            border: 1px solid rgba(212,175,55,0.15);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .article-card:hover {
            border-color: #D4AF37;
            transform: translateY(-3px);
        }
        .article-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        .article-body {
            padding: 20px;
        }
        .article-body h3 {
            color: #D4AF37;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .article-body p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
        }
        .article-meta {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }
        .sidebar-title {
            font-family: 'Orbitron', sans-serif;
            color: #D4AF37;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        .recent-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .recent-item a {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .recent-item a:hover {
            color: #D4AF37;
        }
        .no-results {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        @media (max-width: 768px) {
            .blog-layout {
                flex-direction: column;
            }
            .blog-sidebar {
                position: static;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar" id="navbar">
    <a href="../index.html" class="nav-logo">
        <div class="nav-logo-icon"><img src="../assets/images/logo.png" alt="Afrinova"></div>
        <div class="nav-logo-text">AFRINOVA<span>TECH</span></div>
    </a>
    <ul class="nav-links" id="navLinks">
        <li><a href="../index.html">Accueil</a></li>
        <li><a href="../index.html#services">Services</a></li>
        <li><a href="../portfolio.html">Portfolio</a></li>
        <li><a href="../galerie.html">📸 Galerie</a></li>
        <li><a href="../nouveautes-site.html">🆕 Nouveautés</a></li>
        <li><a href="../devis.html">💰 Devis</a></li>
        <li><a href="index.html" class="active">📝 Blog</a></li>
        <li><a href="../index.html#contact">📞 Contact</a></li>
        <li>
            <select onchange="switchLanguage(this.value)" style="background:#111;color:#D4AF37;border:1px solid rgba(212,175,55,0.3);padding:5px 10px;border-radius:5px;font-size:14px;cursor:pointer;">
                <option value="fr">🇫🇷</option>
                <option value="en">🇬🇧</option>
                <option value="ha">🇳🇪</option>
            </select>
        </li>
    </ul>
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
</nav>

<div class="blog-hero">
    <h1>📝 Blog Afrinova</h1>
    <p>Actualités, tutoriels et innovations tech en Afrique</p>
</div>

<div class="blog-layout">
    <!-- Contenu principal -->
    <div class="blog-main">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Rechercher un article..." oninput="filtrerArticles()">
            <button onclick="filtrerArticles()">🔍</button>
        </div>
        <div class="categories" id="categoriesContainer"></div>
        <div id="articlesContainer"></div>
    </div>

    <!-- Sidebar -->
    <aside class="blog-sidebar">
        <h3 class="sidebar-title">📰 Articles récents</h3>
        <div id="recentArticles"></div>

        <h3 class="sidebar-title" style="margin-top:20px;">🏷️ Catégories</h3>
        <div id="sidebarCategories" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </aside>
</div>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-bottom">
            <p>© 2026 <span>Afrinova Tech</span>. Agadez, Niger.</p>
        </div>
    </div>
</footer>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/lang.js"></script>
<script>
// Articles
var articles = JSON.parse(localStorage.getItem('afrinova_articles') || '[]');
articles.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

// Catégories uniques
var categories = [];
articles.forEach(function(a) {
    if (a.categorie && categories.indexOf(a.categorie) === -1) {
        categories.push(a.categorie);
    }
});

var currentFilter = null; // catégorie active ou null pour "Tous"

// Afficher les boutons de catégories
function afficherCategories() {
    var container = document.getElementById('categoriesContainer');
    var sidebar = document.getElementById('sidebarCategories');
    
    // Boutons principaux
    var html = '<button class="category-btn active" onclick="filtrerParCategorie(null)">Tous</button>';
    categories.forEach(function(cat) {
        html += '<button class="category-btn" onclick="filtrerParCategorie(\'' + cat + '\')">' + cat + '</button>';
    });
    container.innerHTML = html;
    
    // Dans la sidebar (mini boutons)
    var sidebarHtml = '';
    categories.forEach(function(cat) {
        sidebarHtml += '<button class="category-btn" style="font-size:11px;padding:4px 12px;" onclick="filtrerParCategorie(\'' + cat + '\')">' + cat + '</button>';
    });
    sidebar.innerHTML = sidebarHtml || '<span style="color:#888">Aucune catégorie</span>';
}

// Filtrer par catégorie
function filtrerParCategorie(categorie) {
    currentFilter = categorie;
    // Mise en forme des boutons
    document.querySelectorAll('.category-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    var activeBtn = document.querySelector('.category-btn[onclick*="' + (categorie ? categorie : 'null') + '"]');
    if (activeBtn) activeBtn.classList.add('active');
    
    afficherArticles(document.getElementById('searchInput').value);
}

// Afficher les articles selon le filtre texte et la catégorie
function afficherArticles(texte) {
    var conteneur = document.getElementById('articlesContainer');
    var liste = articles;

    // Filtre catégorie
    if (currentFilter) {
        liste = liste.filter(function(a) { return a.categorie === currentFilter; });
    }

    // Filtre texte
    if (texte && texte.trim() !== '') {
        var terme = texte.toLowerCase();
        liste = liste.filter(function(a) {
            return a.titre.toLowerCase().includes(terme) ||
                   (a.contenu || '').toLowerCase().includes(terme) ||
                   (a.categorie || '').toLowerCase().includes(terme);
        });
    }

    if (liste.length === 0) {
        conteneur.innerHTML = '<div class="no-results">📭 Aucun article trouvé</div>';
        return;
    }

    var html = '';
    liste.forEach(function(article) {
        var date = new Date(article.date);
        var dateStr = date.getDate() + '/' + (date.getMonth()+1) + '/' + date.getFullYear();
        var imageStyle = '';
        if (article.image) {
            imageStyle = 'background-image:url(' + article.image + ');';
        } else {
            imageStyle = 'background-color:#1a1a2e;';
        }
        var emoji = article.emoji || '📄';
        var imageHTML = article.image ? '' : '<span style="font-size:50px">' + emoji + '</span>';
        var extrait = (article.contenu || '').substring(0, 150);
        html += '<div class="article-card">';
        html += '<div class="article-image" style="' + imageStyle + '">' + imageHTML + '</div>';
        html += '<div class="article-body">';
        html += '<h3>' + article.titre + '</h3>';
        html += '<p>' + extrait + '...</p>';
        html += '<div class="article-meta">📅 ' + dateStr + ' | 📁 ' + (article.categorie || 'Non classé') + '</div>';
        html += '</div></div>';
    });
    conteneur.innerHTML = html;
}

// Afficher les 5 derniers articles dans la sidebar
function afficherRecents() {
    var sidebar = document.getElementById('recentArticles');
    var recents = articles.slice(0, 5);
    if (recents.length === 0) {
        sidebar.innerHTML = '<p style="color:#888">Aucun article</p>';
        return;
    }
    var html = '';
    recents.forEach(function(article, index) {
        html += '<div class="recent-item"><a href="#" onclick="filtrerParCategorie(null); afficherArticles(\'' + article.titre + '\')">' + article.titre + '</a></div>';
    });
    sidebar.innerHTML = html;
}

// Fonction de recherche
function filtrerArticles() {
    afficherArticles(document.getElementById('searchInput').value);
}

// Initialisation
afficherCategories();
afficherArticles();
afficherRecents();
</script>
</body>
</html>
